<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador Giro Net</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #061121 url("https://johnka1.github.io/pagamento-provedor/wallpaper.png") no-repeat center center fixed;
      background-size: cover;
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px;
    }

    @keyframes crescerCentro {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

    .container {
      background-color: #0c1c40; border-radius: 32px;
      padding: 40px 30px; width: 100%; max-width: 500px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.9); color: white; text-align: center;
      border: 3px solid #00e5ff;
      animation: crescerCentro 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    h2 { color: #00e5ff; font-size: 2.2rem; margin-bottom: 20px; }
    label { display: block; text-align: left; margin: 20px 0 10px; font-weight: 900; color: #2ecc71; font-size: 1.4rem; }
    textarea {
      width: 100%; height: 110px; border-radius: 16px; border: 2px solid #ffffff44;
      padding: 15px; background: #00000044; color: white; font-size: 1.2rem;
    }
    button {
      width: 100%; min-height: 80px; border: none; border-radius: 20px;
      background: linear-gradient(135deg, #1db954 0%, #0056b3 100%);
      color: white; font-size: 1.7rem; font-weight: 900; cursor: pointer; margin-top: 25px;
    }
    #linkGerado {
      margin-top: 30px; background: #ffffff; color: #061121; padding: 25px;
      border-radius: 20px; word-break: break-all; font-weight: 900; font-size: 1.3rem; display: none;
    }
    .btn-whatsapp { background: #25d366; color: #fff; margin-top: 20px; display: none; }
  </style>
</head>
<body>
<div class="container">
  <h2>GERADOR DE COBRANÇA</h2>
  <label>CÓDIGO PIX</label>
  <textarea id="pix"></textarea>
  <label>CÓDIGO BOLETO</label>
  <textarea id="boleto"></textarea>
  <button onclick="gerar()">GERAR LINK</button>
  <div id="linkGerado"></div>
  <button id="btnCopy" class="btn-whatsapp" onclick="copiar()">📋 COPIAR LINK</button>
</div>
<script>
  let linkFinal = "";
  function gerar() {
    const p = encodeURIComponent(document.getElementById("pix").value.trim());
    const b = encodeURIComponent(document.getElementById("boleto").value.trim());
    linkFinal = "https://johnka1.github.io/pagamento-provedor/pagamento.html?pix=" + p + "&boleto=" + b;
    const res = document.getElementById("linkGerado");
    res.innerText = linkFinal; res.style.display = "block";
    document.getElementById("btnCopy").style.display = "block";
  }
  function copiar() { navigator.clipboard.writeText(linkFinal); alert("LINK COPIADO!"); }
</script>
</body>
</html>
