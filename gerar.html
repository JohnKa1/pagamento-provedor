<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador Giro Net</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #020617 url("https://johnka1.github.io/pagamento-provedor/wallpaper.png") no-repeat center center fixed;
      background-size: cover;
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px;
    }

    @keyframes surgir {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    .container {
  /* O primeiro linear-gradient é o fundo do card (Azul Absoluto) */
  /* O segundo é a borda (Azul Oceano -> Verde Esmeralda) - SEM O PRETO */
  background: 
    linear-gradient(#020617, #020617) padding-box, 
    linear-gradient(135deg, #008fb3, #2ecc71) border-box;
  
  border: 5px solid transparent; /* Mantém a borda transparente para o degradê aparecer */
  border-radius: 35px;
  padding: 40px 25px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 40px 100px rgba(0, 0, 0, 1);
  text-align: center;
  color: white;
  
  /* Mantendo a animação e o delay que você configurou */
  opacity: 0;
  pointer-events: none;
}

    .container.visivel {
      animation: surgir 0.6s ease-out forwards;
      pointer-events: auto;
    }

    h2 { color: #008fb3; font-size: 2.2rem; margin-bottom: 20px; text-shadow: 2px 2px 4px #000; }
    label { display: block; text-align: left; margin: 20px 0 10px; font-weight: 900; color: #2ecc71; font-size: 1.4rem; }
    textarea { width: 100%; height: 110px; border-radius: 16px; border: 2px solid #ffffff11; padding: 15px; background: #00000088; color: white; font-size: 1.2rem; }
    button { width: 100%; min-height: 80px; border: none; border-radius: 20px; background: linear-gradient(135deg, #1db954 0%, #0056b3 100%); color: white; font-size: 1.7rem; font-weight: 900; cursor: pointer; margin-top: 25px; }
    #linkGerado { margin-top: 30px; background: #ffffff; color: #061121; padding: 25px; border-radius: 20px; word-break: break-all; font-weight: 900; font-size: 1.3rem; display: none; }
    .btn-whatsapp { background: #25d366; color: #fff; margin-top: 20px; display: none; }
  </style>
</head>
<body>
<div class="container" id="mainCard">
  <h2>GERADOR DE COBRANÇA</h2>
  <label>CÓDIGO PIX</label>
  <textarea id="pix"></textarea>
  <label>CÓDIGO BOLETO</label>
  <textarea id="boleto"></textarea>
  <button onclick="gerar()">GERAR LINK</button>
  <div id="linkGerado"></div>
  <button id="btnCopy" class="btn-whatsapp" onclick="copiar()">📋 COPIAR LINK</button>
</div>
<script>
    const wallpaperUrl = "https://johnka1.github.io/pagamento-provedor/wallpaper.png";
    const img = new Image();
    const card = document.getElementById("mainCard");

    img.onload = function() {
      setTimeout(() => { card.classList.add("visivel"); }, 1000); 
    };
    img.onerror = function() { card.classList.add("visivel"); };
    img.src = wallpaperUrl;

  let linkFinal = "";
  function gerar() {
    const p = encodeURIComponent(document.getElementById("pix").value.trim());
    const b = encodeURIComponent(document.getElementById("boleto").value.trim());
    linkFinal = "https://johnka1.github.io/pagamento-provedor/pagamento.html?pix=" + p + "&boleto=" + b;
    const res = document.getElementById("linkGerado");
    res.innerText = linkFinal; res.style.display = "block";
    document.getElementById("btnCopy").style.display = "block";
  }
  function copiar() { navigator.clipboard.writeText(linkFinal); alert("LINK COPIADO!"); }
</script>
</body>
</html>
