<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerar Pagamento - Giro Net</title>
  <style>
    body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background-color: #061121; 
  background-image: url("https://johnka1.github.io/pagamento-provedor/wallpaper.png");
  background-repeat: no-repeat;
  background-position: center center;
  background-attachment: fixed;
  background-size: cover;
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px) saturate(180%);
      -webkit-backdrop-filter: blur(15px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 30px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      text-align: center;
      color: white;
    }
    h2 { margin-top: 0; color: #00d4ff; }
    label { display: block; text-align: left; margin: 10px 0 5px; font-weight: bold; font-size: 0.9em; }
    textarea {
      width: 100%; height: 80px; resize: none; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
      padding: 12px; background: rgba(0, 0, 0, 0.3); color: white; margin-bottom: 10px;
    }
    button {
      width: 100%; padding: 15px; border: none; border-radius: 12px;
      background: linear-gradient(90deg, #00d4ff 0%, #0078ff 100%);
      color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;
    }
    #linkGerado {
      margin-top: 20px; background: rgba(255,255,255,0.9); color: #333; padding: 15px;
      border-radius: 12px; word-break: break-all; font-size: 0.85em; display: none;
    }
    .btn-copy { background: #25d366; margin-top: 10px; display: none; }
  </style>
</head>
<body>
<div class="container">
  <h2>Gerar Cobrança</h2>
  <label>PIX</label>
  <textarea id="pix"></textarea>
  <label>Boleto</label>
  <textarea id="boleto"></textarea>
  <button onclick="gerar()">Gerar Link</button>
  <div id="linkGerado"></div>
  <button id="btnCopy" class="btn-copy" onclick="copiar()">📋 Copiar para WhatsApp</button>
</div>
<script>
  let linkFinal = "";
  function gerar() {
    const p = encodeURIComponent(document.getElementById("pix").value.trim());
    const b = encodeURIComponent(document.getElementById("boleto").value.trim());
    linkFinal = "https://johnka1.github.io/pagamento-provedor/pagamento.html?pix=" + p + "&boleto=" + b;
    document.getElementById("linkGerado").innerText = linkFinal;
    document.getElementById("linkGerado").style.display = "block";
    document.getElementById("btnCopy").style.display = "block";
  }
  function copiar() { navigator.clipboard.writeText(linkFinal); alert("Copiado!"); }
</script>
</body>
</html>
