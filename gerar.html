<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador Giro Net</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #061121 url("https://johnka1.github.io/pagamento-provedor/wallpaper.png") no-repeat center center fixed;
      background-size: cover;
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px;
    }
    .container {
  /* O segredo: baixamos de 0.85 para 0.4 */
  background: rgba(0, 15, 35, 0.4); 
  
  /* Aumentamos o desfoque para o fundo não atrapalhar o texto */
  backdrop-filter: blur(25px) saturate(200%);
  -webkit-backdrop-filter: blur(25px) saturate(200%);
  
  /* Borda levemente branca para dar o brilho do vidro */
  border: 1px solid rgba(255, 255, 255, 0.25);
  
  border-radius: 32px;
  padding: 35px 25px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
  text-align: center;
  color: white;
}
    h2 { color: #00e5ff; font-size: 2.2rem; text-shadow: 3px 3px 5px rgba(0,0,0,0.8); }
    label { display: block; text-align: left; margin: 20px 0 10px; font-weight: 900; color: #2ecc71; font-size: 1.4rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
    textarea {
      width: 100%; height: 110px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.2);
      padding: 15px; background: rgba(0,0,0,0.5); color: white; font-size: 1.2rem; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }
    button {
      width: 100%; min-height: 70px; border: none; border-radius: 20px;
      background: linear-gradient(135deg, #1db954 0%, #0056b3 100%);
      color: white; font-size: 1.7rem; font-weight: 900; cursor: pointer; margin-top: 25px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4); text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    #linkGerado {
      margin-top: 30px; background: #ffffff; color: #061121; padding: 25px;
      border-radius: 20px; word-break: break-all; font-weight: 900; font-size: 1.3rem;
      display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .btn-whatsapp { background: #25d366; color: #fff; margin-top: 20px; display: none; }
  </style>
</head>
<body>
<div class="container">
  <h2>GERADOR DE COBRANÇA</h2>
  <label>CÓDIGO PIX</label>
  <textarea id="pix"></textarea>
  <label>CÓDIGO BOLETO</label>
  <textarea id="boleto"></textarea>
  <button onclick="gerar()">GERAR LINK</button>
  <div id="linkGerado"></div>
  <button id="btnCopy" class="btn-whatsapp" onclick="copiar()">📋 COPIAR LINK</button>
</div>
<script>
  let linkFinal = "";
  function gerar() {
    const p = encodeURIComponent(document.getElementById("pix").value.trim());
    const b = encodeURIComponent(document.getElementById("boleto").value.trim());
    linkFinal = "https://johnka1.github.io/pagamento-provedor/pagamento.html?pix=" + p + "&boleto=" + b;
    const res = document.getElementById("linkGerado");
    res.innerText = linkFinal; res.style.display = "block";
    document.getElementById("btnCopy").style.display = "block";
  }
  function copiar() { navigator.clipboard.writeText(linkFinal); alert("LINK COPIADO!"); }
</script>
</body>
</html>
