<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Página de Pagamento</title>

<style>

body{
font-family:Arial;
background-image:url("wallpaper.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
padding:40px;
margin:0;
}

.container{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:12px;
max-width:500px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

textarea{
width:100%;
height:80px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
padding:8px;
}

button{
padding:14px;
width:100%;
border:none;
background:#00C48C;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
transition:0.2s;
}

button:hover{
background:#00996c;
transform:scale(1.03);
}

#linkGerado{
margin-top:20px;
word-break:break-all;
background:#eee;
padding:10px;
border-radius:6px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>Gerar Pagamento</h2>

<label>PIX Copia e Cola</label>
<textarea id="pix"></textarea>

<label>Código de Barras</label>
<textarea id="boleto"></textarea>

<button onclick="gerar()">Gerar Link</button>

<div id="linkGerado"></div>

<button id="copiarBtn" onclick="copiarLink()" style="display:none">
📋 Copiar Link para WhatsApp
</button>

</div>

<script>

let linkFinal = ""

function gerar(){

const pix = encodeURIComponent(document.getElementById("pix").value)
const boleto = encodeURIComponent(document.getElementById("boleto").value)

linkFinal = "https://johnka1.github.io/pagamento-provedor/pagamento.html?pix="+pix+"&boleto="+boleto

document.getElementById("linkGerado").style.display="block"
document.getElementById("linkGerado").innerText=linkFinal

document.getElementById("copiarBtn").style.display="block"

}

function copiarLink(){

navigator.clipboard.writeText(linkFinal)
alert("Link copiado!")

}

</script>

</body>
</html>
