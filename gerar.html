<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador Giro Net</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      /* O segredo: a cor de fundo carrega antes da imagem */
      background-color: #020617;
      background-image: url("https://johnka1.github.io/pagamento-provedor/wallpaper.png");
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
      background-size: cover;
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px;
    }

    @keyframes surgir {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    .container {
      background: linear-gradient(#020617, #020617) padding-box, linear-gradient(135deg, #008fb3, #2ecc71) border-box;
      border: 5px solid transparent;
      border-radius: 35px;
      padding: 40px 30px; width: 100%; max-width: 500px;
      box-shadow: 0 40px 100px rgba(0,0,0,1); color: white; text-align: center;
      opacity: 0; pointer-events: none;
    }

    .container.visivel {
      animation: surgir 0.6s ease-out forwards;
      pointer-events: auto;
    }

    h2 { color: #008fb3; font-size: 2.2rem; margin-bottom: 20px; text-shadow: 2px 2px 4px #000; }
    label { display: block; text-align: left; margin: 20px 0 10px; font-weight: 900; color: #2ecc71; font-size: 1.4rem; }
    textarea { width: 100%; height: 110px; border-radius: 16px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: white; font-size: 1.2rem; padding: 15px; resize: none; }
    button { width: 100%; min-height: 80px; border: none; border-radius: 20px; background: linear-gradient(135deg, #1db954 0%, #0056b3 100%); color: white; font-size: 1.7rem; font-weight: 900; cursor: pointer; margin-top: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
    #linkGerado { margin-top: 30px; background: #ffffff; color: #020617; padding: 25px; border-radius: 20px; word-break: break-all; font-weight: 900; font-size: 1.3rem; display: none; }
    .btn-whatsapp { background: #25d366; color: #fff; margin-top: 20px; display: none; }

    @media (max-width: 480px) {
      .container { max-width: 400px; padding: 30px 20px; }
      h2 { font-size: 1.7rem; }
      label { font-size: 1.1rem; margin: 15px 0 8px; }
      textarea { height: 90px; font-size: 1rem; }
      button { min-height: 65px; font-size: 1.4rem; margin-top: 20px; }
      #linkGerado { padding: 15px; font-size: 1rem; }
    }
  </style>
</head>
<body>
<div class="container" id="mainCard">
  <h2>GERADOR DE COBRANÇA</h2>
  <label>CÓDIGO PIX</label>
  <textarea id="pix" placeholder="Cole o código PIX aqui..."></textarea>
  <label>CÓDIGO BOLETO</label>
  <textarea id="boleto" placeholder="Cole o código de barras aqui..."></textarea>
  <button onclick="gerar()">GERAR LINK</button>
  <div id="linkGerado"></div>
  <button id="btnCopy" class="btn-whatsapp" onclick="copiar()">📋 COPIAR LINK</button>
</div>

<script>
    const wallpaperUrl = "https://johnka1.github.io/pagamento-provedor/wallpaper.png";
    const img = new Image();
    const card = document.getElementById("mainCard");
    let cardJaApareceu = false;

    // Função central para mostrar o card
    function dispararCard() {
      if (!cardJaApareceu) {
        cardJaApareceu = true;
        card.classList.add("visivel");
      }
    }

    // Se a imagem carregar rápido, esperamos 1s de "charme"
    img.onload = function() {
      setTimeout(dispararCard, 1000); 
    };

    // Se a imagem der erro ou demorar mais de 2 segundos (no 4G), mostra o card de qualquer jeito!
    img.onerror = dispararCard;
    setTimeout(dispararCard, 2000); 

    img.src = wallpaperUrl;

    let linkFinal = "";
    function gerar() {
      const pixVal = document.getElementById("pix").value.trim();
      const boletoVal = document.getElementById("boleto").value.trim();
      if(!pixVal && !boletoVal) { alert("Preencha ao menos um campo."); return; }
      const p = encodeURIComponent(pixVal);
      const b = encodeURIComponent(boletoVal);
      linkFinal = "https://johnka1.github.io/pagamento-provedor/pagamento.html?pix=" + p + "&boleto=" + b;
      const res = document.getElementById("linkGerado");
      res.innerText = linkFinal; res.style.display = "block";
      document.getElementById("btnCopy").style.display = "block";
    }
    function copiar() { if(linkFinal) { navigator.clipboard.writeText(linkFinal); alert("LINK COPIADO!"); } }
</script>
</body>
</html>
