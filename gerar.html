<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador Giro Net</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #061121 url("https://johnka1.github.io/pagamento-provedor/wallpaper.png") no-repeat center center fixed;
      background-size: cover;
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 15px;
    }
    .container {
      background: rgba(0, 10, 25, 0.8);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 28px;
      padding: 30px;
      width: 100%; max-width: 450px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      color: white; text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    h2 { color: #00e5ff; margin-bottom: 25px; }
    label { display: block; text-align: left; margin: 15px 0 8px; font-weight: bold; color: #2ecc71; }
    textarea {
      width: 100%; height: 90px; resize: none; border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1); padding: 12px;
      background: rgba(0,0,0,0.3); color: white; font-size: 1rem;
    }
    textarea:focus { border-color: #00e5ff; outline: none; }
    button {
      width: 100%; min-height: 55px; border: none; border-radius: 16px;
      background: linear-gradient(135deg, #1db954 0%, #0056b3 100%);
      color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer;
      margin-top: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    }
    #linkGerado {
      margin-top: 25px; background: #ffffff; color: #061121; padding: 20px;
      border-radius: 16px; word-break: break-all; font-weight: bold;
      display: none; box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
    }
    .btn-whatsapp { background: #25d366; color: #fff; margin-top: 15px; display: none; }
  </style>
</head>
<body>
<div class="container">
  <h2>Gerador de Cobrança</h2>
  <label>CÓDIGO PIX</label>
  <textarea id="pix" placeholder="Cole o Pix aqui..."></textarea>
  <label>CÓDIGO BOLETO</label>
  <textarea id="boleto" placeholder="Cole o boleto aqui..."></textarea>
  <button onclick="gerar()">GERAR LINK AGORA</button>
  <div id="linkGerado"></div>
  <button id="btnCopy" class="btn-whatsapp" onclick="copiar()">📋 COPIAR PARA WHATSAPP</button>
</div>
<script>
  let linkFinal = "";
  function gerar() {
    const p = encodeURIComponent(document.getElementById("pix").value.trim());
    const b = encodeURIComponent(document.getElementById("boleto").value.trim());
    linkFinal = "https://johnka1.github.io/pagamento-provedor/pagamento.html?pix=" + p + "&boleto=" + b;
    const res = document.getElementById("linkGerado");
    res.innerText = linkFinal;
    res.style.display = "block";
    document.getElementById("btnCopy").style.display = "block";
  }
  function copiar() { navigator.clipboard.writeText(linkFinal); alert("Link copiado para o WhatsApp!"); }
</script>
</body>
</html>
