<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Página de Pagamento</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.container{
background:white;
padding:25px;
border-radius:8px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:80px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:12px;
width:100%;
border:none;
background:#25D366;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

#linkGerado{
margin-top:20px;
word-break:break-all;
background:#eee;
padding:10px;
border-radius:5px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>Gerar Pagamento</h2>

<label>PIX Copia e Cola</label>
<textarea id="pix"></textarea>

<label>Código de Barras</label>
<textarea id="boleto"></textarea>

<button onclick="gerar()">Gerar Link</button>

<div id="linkGerado"></div>

<button id="copiarBtn" onclick="copiarLink()" style="display:none">
📋 Copiar Link para WhatsApp
</button>

</div>

<script>

let linkFinal = ""

function gerar(){

const pix = encodeURIComponent(document.getElementById("pix").value)
const boleto = encodeURIComponent(document.getElementById("boleto").value)

linkFinal = window.location.origin + "/pagamento.html?pix="+pix+"&boleto="+boleto

document.getElementById("linkGerado").style.display="block"
document.getElementById("linkGerado").innerText=linkFinal

document.getElementById("copiarBtn").style.display="block"

}

function copiarLink(){

navigator.clipboard.writeText(linkFinal)

alert("Link copiado!")

}

</script>

</body>
</html>
