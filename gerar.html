<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Página de Pagamento</title>

<style>

body{
font-family:Arial;
background-image:url("wallpaper.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
 background-attachment:fixed;
padding:40px;
margin:0;
}

.container{
background:rgba(255,255,255,0.18);
backdrop-filter: blur(11px) saturate(180%);
-webkit-backdrop-filter: blur(11px) saturate(180%);
border-radius:18px;
padding:26px;
width:364px;
position:absolute;
top:68%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
box-shadow:0 8px 40px 0 rgba(0, 120, 255, 0.25);
}

textarea{
width:100%;
height:80px;
 resize:none;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
padding:8px;
background:rgba(255,255,255,0.18);
backdrop-filter: blur(5.5px) saturate(180%);
-webkit-backdrop-filter: blur(5.5px) saturate(180%);
box-shadow:0 2px 8px 0 rgba(0, 120, 255, 0.10);
}

button{
padding:14px;
width:100%;
border:none;
background: linear-gradient(90deg, rgba(0,212,255,0.4) 0%, rgba(0,212,255,0.7) 100%);
color:white;
font-size:16px;
border-radius:12px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
transition:0.2s;
backdrop-filter: blur(5.5px) saturate(180%);
-webkit-backdrop-filter: blur(5.5px) saturate(180%);
box-shadow:0 4px 20px 0 rgba(0, 120, 255, 0.25);
}

button:hover{
background: linear-gradient(90deg, rgba(0,212,255,0.7) 0%, rgba(0,212,255,1) 100%);
transform:scale(1.05);
}

#linkGerado{
margin-top:20px;
word-break:break-all;
background:#eee;
padding:10px;
border-radius:6px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>Gerar Pagamento</h2>

<label>PIX Copia e Cola</label>
<textarea id="pix"></textarea>

<label>Código de Barras</label>
<textarea id="boleto"></textarea>

<button onclick="gerar()">Gerar Link</button>

<div id="linkGerado"></div>

<button id="copiarBtn" onclick="copiarLink()" style="display:none">
📋 Copiar Link para WhatsApp
</button>

</div>

<script>

let linkFinal = ""

function gerar(){


const pix = encodeURIComponent(document.getElementById("pix").value)
const boleto = encodeURIComponent(document.getElementById("boleto").value)

linkFinal = "https://johnka1.github.io/pagamento-provedor/pagamento.html?pix="+pix+"&boleto="+boleto

document.getElementById("linkGerado").style.display="block"
document.getElementById("linkGerado").innerText=linkFinal

document.getElementById("copiarBtn").style.display="block"

}

function copiarLink(){
navigator.clipboard.writeText(linkFinal)
alert("Link copiado!")
}

</script>

</body>
</html>
