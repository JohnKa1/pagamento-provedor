<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagar Fatura - Giro Net</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background-color: #061121; 
  background-image: url("https://johnka1.github.io/pagamento-provedor/wallpaper.png");
  background-repeat: no-repeat;
  background-position: center center;
  background-attachment: fixed;
  background-size: cover;
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px) saturate(180%);
      -webkit-backdrop-filter: blur(15px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
      color: white;
    }
    h3 { margin-top: 0; margin-bottom: 20px; font-weight: 600; color: #00d4ff; }
    #qrcode {
      background: white;
      padding: 12px;
      border-radius: 16px;
      display: inline-block;
      margin-bottom: 20px;
    }
    canvas { max-width: 100%; height: auto !important; border-radius: 8px; }
    .dados {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 10px;
      text-align: left;
      font-size: 0.9em;
      word-break: break-all;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .label-fatura { color: #00d4ff; font-weight: bold; display: block; margin-bottom: 4px; font-size: 0.8em; text-transform: uppercase; }
    button {
      width: 100%;
      padding: 16px;
      margin-bottom: 12px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #00d4ff 0%, #0078ff 100%);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4); }
  </style>
</head>
<body>
  <div class="container">
    <h3>Pagar Fatura</h3>
    <div id="qrcode"></div>
    <div class="dados">
      <span class="label-fatura">PIX Copia e Cola</span>
      <span id="pixText">Carregando...</span>
    </div>
    <button onclick="copiarPix()">Copiar Código PIX</button>
    <div class="dados">
      <span class="label-fatura">Código de Barras</span>
      <span id="boletoText">Carregando...</span>
    </div>
    <button onclick="copiarBoleto()">Copiar Boleto</button>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const pix = params.get("pix") || "";
    const boleto = params.get("boleto") || "";
    if (pix) {
      document.getElementById("pixText").innerText = pix;
      QRCode.toCanvas(document.createElement("canvas"), pix, { width: 220, margin: 1 }, function (error, canvas) {
        if (!error) document.getElementById("qrcode").appendChild(canvas);
      });
    }
    if (boleto) document.getElementById("boletoText").innerText = boleto;
    function copiarPix() { navigator.clipboard.writeText(pix); alert("PIX copiado!"); }
    function copiarBoleto() { navigator.clipboard.writeText(boleto); alert("Boleto copiado!"); }
  </script>
</body>
</html>
