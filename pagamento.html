<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagar Fatura</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background-image:url("wallpaper.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
margin:0;
}

.container{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);

background:rgba(255,255,255,0.95);
padding:20px;
border-radius:14px;
text-align:center;
width:280px;

box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

#qrcode{
margin-bottom:15px;
background:white;
padding:10px;
border-radius:8px;
}

button{
width:100%;
padding:14px;
margin-top:8px;
border:none;
border-radius:8px;
background:#00C48C;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#00996c;
transform:scale(1.04);
}

</style>
</head>

<body>

<div class="container">

<h3>Pagar Fatura</h3>

<canvas id="qrcode"></canvas>

<button onclick="copiarPix()">Copiar PIX</button>

<button onclick="copiarBoleto()">Copiar Código de Barras</button>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const pix = params.get("pix")
const boleto = params.get("boleto")

const canvas = document.getElementById("qrcode")

if(pix){
QRCode.toCanvas(canvas, pix, function (error) {
if (error) console.error(error)
})
}

function copiarPix(){
navigator.clipboard.writeText(pix)
alert("PIX copiado!")
}

function copiarBoleto(){
navigator.clipboard.writeText(boleto)
alert("Código de barras copiado!")
}

</script>

</body>
</html>
