<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pagar Fatura</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url("wallpaper.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(11px) saturate(180%);
      -webkit-backdrop-filter: blur(11px) saturate(180%);
      border-radius: 18px;
      padding: 32px 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px 0 rgba(0, 120, 255, 0.25);
      text-align: center;
    }
    h3 {
      margin-bottom: 18px;
      font-size: 1.3em;
    }
    #qrcode {
      margin-bottom: 18px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 8px 0 rgba(0, 120, 255, 0.10);
      display: inline-block;
    }
    .dados {
      margin-bottom: 10px;
      text-align: left;
      font-size: 1em;
      color: #222;
      word-break: break-all;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(5.5px) saturate(180%);
      -webkit-backdrop-filter: blur(5.5px) saturate(180%);
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 2px 8px 0 rgba(0, 120, 255, 0.10);
    }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, rgba(0,212,255,0.4) 0%, rgba(0,212,255,0.7) 100%);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(5.5px) saturate(180%);
      -webkit-backdrop-filter: blur(5.5px) saturate(180%);
      box-shadow: 0 4px 20px 0 rgba(0, 120, 255, 0.25);
    }
    button:hover {
      background: linear-gradient(90deg, rgba(0,212,255,0.7) 0%, rgba(0,212,255,1) 100%);
      transform: scale(1.04);
    }
    @media (max-width: 500px) {
      .container { padding: 18px 4vw; }
      .dados { font-size: 0.95em; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>Pagar Fatura</h3>
    <div id="qrcode"></div>
    <div class="dados" id="pixArea"></div>
    <button onclick="copiarPix()">Copiar PIX</button>
    <div class="dados" id="boletoArea"></div>
    <button onclick="copiarBoleto()">Copiar Código de Barras</button>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const pix = params.get("pix") || "";
    const boleto = params.get("boleto") || "";
    const qrcodeDiv = document.getElementById("qrcode");
    const pixArea = document.getElementById("pixArea");
    const boletoArea = document.getElementById("boletoArea");

    if (pix) {
      QRCode.toCanvas(document.createElement("canvas"), pix, function (error, canvas) {
        if (!error) qrcodeDiv.appendChild(canvas);
      });
      pixArea.innerHTML = "<b>PIX:</b><br>" + pix;
    } else {
      pixArea.innerHTML = "<b>PIX:</b><br><i>Não informado</i>";
    }
    if (boleto) {
      boletoArea.innerHTML = "<b>Código de Barras:</b><br>" + boleto;
    } else {
      boletoArea.innerHTML = "<b>Código de Barras:</b><br><i>Não informado</i>";
    }

    function copiarPix() {
      navigator.clipboard.writeText(pix);
      alert("PIX copiado!");
    }
    function copiarBoleto() {
      navigator.clipboard.writeText(boleto);
      alert("Código de barras copiado!");
    }
  </script>
</body>
</html>
